<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>CardWay | 我的卡包設定</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #06c755;
      --bg: #0f172a;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text: #f8fafc;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* Glass Layout */
    .app-container {
      min-height: 100vh;
      padding: 20px;
      padding-bottom: 100px;
      /* 防止被底欄擋住 */
      display: flex;
      flex-direction: column;
    }

    .glass-card {
      background: var(--glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    /* Views */
    .view {
      display: none;
      animation: fadeIn 0.4s ease-out;
    }

    .view.active {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Typography */
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    p.subtitle {
      opacity: 0.6;
      font-size: 14px;
      margin-bottom: 24px;
    }

    /* Home View Stats */
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-item {
      background: rgba(255, 255, 255, 0.03);
      padding: 16px;
      border-radius: 16px;
      text-align: center;
    }

    .stat-val {
      font-size: 20px;
      font-weight: 600;
      color: var(--primary);
    }

    .stat-lbl {
      font-size: 12px;
      opacity: 0.5;
      margin-top: 4px;
    }

    /* Search Bar */
    .search-container {
      margin-bottom: 16px;
      position: relative;
    }

    .search-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: 0.3s;
    }

    .search-input:focus {
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.08);
    }

    .bank-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
      max-height: 250px;
      overflow-y: auto;
      padding-right: 5px;
    }

    .bank-grid::-webkit-scrollbar {
      width: 4px;
    }

    .bank-grid::-webkit-scrollbar-thumb {
      background: var(--glass-border);
      border-radius: 10px;
    }

    .bank-card {
      padding: 12px;
      border-radius: 16px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      text-align: center;
      font-size: 13px;
      cursor: pointer;
      transition: 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60px;
    }

    .bank-card.active {
      background: var(--primary);
      color: #000;
      border-color: var(--primary);
      font-weight: 600;
    }

    .card-list {
      display: grid;
      gap: 12px;
    }

    .card-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--glass-border);
    }

    .card-info h4 {
      font-size: 15px;
      margin-bottom: 2px;
    }

    .card-info p {
      font-size: 12px;
      opacity: 0.5;
    }

    .add-btn {
      background: var(--primary);
      color: #000;
      border: none;
      padding: 8px 16px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 13px;
    }

    /* Payment Logic */
    .pay-item {
      margin-bottom: 12px;
    }

    .pay-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 15px;
      font-weight: 600;
    }

    .chip-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .mini-chip {
      padding: 6px 12px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .mini-chip.selected {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(6, 199, 85, 0.1);
    }

    /* Footer Nav */
    .nav-bar {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      height: 64px;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      display: flex;
      justify-content: space-around;
      align-items: center;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0.4;
      transition: 0.3s;
    }

    .nav-item.active {
      opacity: 1;
      color: var(--primary);
    }

    .nav-item i {
      font-size: 20px;
      margin-bottom: 4px;
    }

    .nav-item span {
      font-size: 10px;
      font-weight: 600;
    }

    button.primary-btn {
      width: 100%;
      background: var(--primary);
      color: #000;
      border: none;
      padding: 18px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <div class="app-container">
    <!-- View 1: Home -->
    <div id="view-home" class="view active">
      <div class="glass-card">
        <h1 id="user-name">載入中...</h1>
        <p class="subtitle">歡迎來到您的專屬智慧卡包</p>

        <div class="stat-grid">
          <div class="stat-item">
            <div class="stat-val" id="count-cards">0</div>
            <div class="stat-lbl">張卡片</div>
          </div>
          <div class="stat-item">
            <div class="stat-val" id="count-pay">0</div>
            <div class="stat-lbl">個支付設定</div>
          </div>
        </div>

        <div id="wallet-summary" style="opacity: 0.5; font-size: 14px; text-align: center;">
          尚未設定任何卡片，快去挑選吧！
        </div>
      </div>
      <button class="primary-btn" onclick="switchView('view-cards')">編輯我的卡片設定</button>
    </div>

    <!-- View 2: Card Selection (Shopping Cart Style) -->
    <div id="view-cards" class="view">
      <div class="glass-card">
        <h1>選擇您的卡片</h1>
        <p class="subtitle">將您擁有的卡片加入「我的卡包」</p>

        <div class="search-container">
          <input type="text" id="bank-search" class="search-input" placeholder="搜尋銀行名稱（如：中信、國泰）..."
            oninput="filterBanks()">
        </div>

        <div class="bank-grid" id="bank-list">
          <!-- Banks will be injected -->
        </div>

        <div class="card-list" id="card-list">
          <!-- Cards will be injected -->
        </div>
      </div>

      <!-- Bottom Drawer -->
      <div class="glass-card"
        style="padding: 16px; margin-top: -10px; position: sticky; bottom: 84px; z-index: 10; border-color: var(--primary);">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <span id="cart-count">已選擇 0 張</span>
          <button class="add-btn" style="background:#fff" onclick="switchView('view-payments')">下一步：綁定支付</button>
        </div>
      </div>
    </div>

    <!-- View 3: Payment Mapping -->
    <div id="view-payments" class="view">
      <div class="glass-card">
        <h1>支付方式綁定</h1>
        <p class="subtitle">哪些卡片已綁定到這些支付工具？</p>

        <div id="payment-mapping-list">
          <!-- Payment Mapping logic -->
        </div>
      </div>
      <button class="primary-btn" id="save-btn" onclick="saveAll()">儲存所有設定並同步</button>
    </div>
  </div>

  <!-- Bottom Nav -->
  <div class="nav-bar">
    <div class="nav-item active" onclick="switchView('view-home')" id="nav-home">
      <span>首頁</span>
    </div>
    <div class="nav-item" onclick="switchView('view-cards')" id="nav-cards">
      <span>加卡</span>
    </div>
    <div class="nav-item" onclick="switchView('view-payments')" id="nav-payments">
      <span>綁定</span>
    </div>
  </div>

      "017 兆豐銀行": ["利多御璽卡", "e秒刷鈦金卡", "Mega One一卡通聯名卡", "Gogoro聯名卡", "宇宙明星BT21信用卡", "統一7-ELEVEN獅聯名卡", "將來銀行聯名卡", "世界卡"],

      "052 渣打銀行": ["LINE Bank聯名卡", "渣打現金回饋御璽卡", "優先理財無限卡"],
      "053 台中銀行": ["MySense御璽卡", "哆啦A夢卡 (JCB)", "媽祖平安卡", "樂購卡"],

      "102 華泰銀行": ["JCB晶緻卡", "JCB白金卡"],
      "103 新光銀行": ["寰宇現金回饋卡", "新光三越聯名卡", "OU點點卡", "悠遊聯名卡 (分期七卡)", "日本航空聯名卡", "鼎極卡 (無限/世界)"],
      "108 陽信銀行": ["JCB哆啦A夢卡", "曜晶卡", "日本一卡", "彭村梅聯名卡", "一卡通聯名鈦金卡"],
      "118 板信商銀": ["(無發行信用卡，僅發行VISA金融卡)"],
      "147 三信商銀": ["樂活卡 (普卡/金卡/白金卡)"],
      "803 聯邦銀行": ["吉鶴卡", "LINE Bank聯名卡", "賴點卡", "幸福M卡", "綠卡", "微風聯名卡", "農金認同卡"],
      "805 遠東商銀": ["樂家+卡", "快樂信用卡", "遠東快樂信用卡", "C'est Moi我的卡"],
      "806 元大銀行": ["鑽金智富卡", "元大鑽金卡", "Hello Kitty聯名卡", "愛金卡 (icash)", "分享黑啤卡", "樂遊卡"],
      "807 永豐銀行": ["DAWAY卡", "SPORT卡", "幣倍卡", "大戶DAWHO信用卡", "夢行卡", "MITSUI OUTLET PARK聯名卡", "漢神巨蛋聯名卡", "保倍卡"],
      "808 玉山銀行": ["Unicard", "U Bear信用卡", "Pi拍錢包信用卡", "熊本熊卡", "家樂福聯名卡", "星宇航空聯名卡", "無限卡/世界卡", "國民旅遊卡", "漢神巨蛋聯名卡", "南山人壽聯名卡"],
      "809 凱基銀行": ["魔BUY卡", "魔FUN卡", "雙幣哩程卡"],
      "810 星展銀行": ["eco永續卡", "飛行世界之極卡", "飛行世界商務卡", "饗樂生活卡", "PChome Prime聯名卡", "炫晶商務御璽卡", "everyday card"],
      "812 台新銀行": ["太陽卡 (2024新權益版)", "玫瑰卡 (2024新權益版)", "@GoGo卡 (黑狗卡)", "FlyGo卡 (飛狗卡)", "街口聯名卡", "遠傳friDay聯名卡", "Gogoro Rewards聯名卡", "新光三越聯名卡", "燦坤生活聯名卡", "卓富無限卡"],
      "816 安泰銀行": ["安泰悠遊分期卡", "安泰分期卡"],
      "822 中國信託": ["LINE Pay信用卡", "中華航空聯名卡", "Agoda聯名卡", "中油聯名卡", "ALL ME卡", "Foodpanda聯名卡", "和泰聯名卡", "Mitsui Shopping Park LaLaport聯名卡", "TAIPEI 101 聯名卡", "漢神百貨聯名卡", "Global Mall聯名卡", "商旅鈦金卡", "英雄聯盟信用卡"],
      "[無] 美國運通": ["美國運通簽帳白金卡 (大白)", "美國運通信用白金卡 (小白)", "美國運通長榮航空簽帳白金卡", "美國運通長榮航空簽帳金卡", "美國運通晶華珍饌信用白金卡", "美國運通簽帳金卡"],
      "[無] 樂天信用卡": ["樂天信用卡 (多種卡面: 樂天胖達/桃猿/玫瑰金等)", "樂虎卡 (台灣虎航聯名)"],
      "[無] 台灣永旺": ["AEON聯名卡"]
    };

    let selectedBank = "013 國泰世華"; // Default to a common one

    const PAY_METHODS = [
      "LINE Pay",
      "街口支付",
      "全支付",
      "Apple Pay/Google Pay/Samsung Pay",
      "台灣 Pay",
      "icash Pay / OPEN 錢包",
      "全盈+PAY",
      "悠遊付",
      "Pi 拍錢包"
    ];

    // State
    let myWallet = []; // { bank, name }
    let payMap = {};   // { "LINE Pay": ["CUBE卡", ... ] }

    window.onload = async () => {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const profile = await liff.getProfile();
        document.getElementById('user-name').innerText = `Hi, ${profile.displayName}`;

        await loadSettings(); // 取得舊設定
        renderBanks();
        renderPaymentSetup();
        updateHomeStats();
      } catch (e) {
        alert("LIFF 載入失敗: " + e.message);
      }
    };

    async function loadSettings() {
      const loadingEl = document.getElementById('count-cards');
      loadingEl.innerText = "...";
      try {
        const idToken = liff.getIDToken();
        const res = await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: "get_settings", idToken: idToken })
        });
        const data = await res.json();
        if (data.success && data.settings) {
          myWallet = data.settings.myWallet || [];
          payMap = data.settings.payMap || {};
          document.getElementById('cart-count').innerText = `已選擇 ${myWallet.length} 張`;
        }
      } catch (e) {
        console.warn("無法取得預存設定", e);
      }
    }

    function switchView(viewId) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(viewId).classList.add('active');

      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById('nav-' + viewId.split('-')[1]).classList.add('active');
    }

    function renderBanks(filter = "") {
      const container = document.getElementById('bank-list');
      container.innerHTML = '';

      const banks = Object.keys(CARD_DB).filter(b => b.includes(filter));

      banks.forEach((bank) => {
        const card = document.createElement('div');
        card.className = `bank-card ${bank === selectedBank ? 'active' : ''}`;
        card.innerText = bank;
        card.onclick = () => {
          selectedBank = bank;
          document.querySelectorAll('.bank-card').forEach(c => c.classList.remove('active'));
          card.classList.add('active');
          renderCards(bank);
        };
        container.appendChild(card);
      });

      if (banks.length > 0 && !banks.includes(selectedBank)) {
        // Optional: keep card list as is or clear it
      }
    }

    function filterBanks() {
      const q = document.getElementById('bank-search').value;
      renderBanks(q);
    }

    function renderCards(bank) {
      if (!bank) return;
      const container = document.getElementById('card-list');
      container.innerHTML = '';
      CARD_DB[bank].forEach(cardName => {
        const item = document.createElement('div');
        item.className = 'card-item';
        const isSelected = myWallet.some(c => c.name === cardName);
        item.innerHTML = `
                    <div class="card-info">
                        <h4>${cardName}</h4>
                        <p>${bank}</p>
                    </div>
                    <button class="add-btn" onclick="toggleCard('${bank}', '${cardName}')" style="background:${isSelected ? '#1e293b' : 'var(--primary)'}; color:${isSelected ? '#fff' : '#000'}">
                        ${isSelected ? '已移出' : '加入'}
                    </button>
                `;
        container.appendChild(item);
      });
    }

    function toggleCard(bank, name) {
      const idx = myWallet.findIndex(c => c.name === name);
      if (idx > -1) myWallet.splice(idx, 1);
      else myWallet.push({ bank, name });

      updateHomeStats();
      renderCards(bank);
      renderPaymentSetup(); // Update available chips in mapping
      document.getElementById('cart-count').innerText = `已選擇 ${myWallet.length} 張`;
    }

    function renderPaymentSetup() {
      const container = document.getElementById('payment-mapping-list');
      container.innerHTML = '';

      if (myWallet.length === 0) {
        container.innerHTML = '<p style="text-align:center; opacity:0.5; margin-top:40px;">請先在「加卡」分頁挑選卡片</p>';
        return;
      }

      PAY_METHODS.forEach(pay => {
        const div = document.createElement('div');
        div.className = 'pay-item';
        div.innerHTML = `<div class="pay-header"><span>${pay}</span></div>`;

        const chipContainer = document.createElement('div');
        chipContainer.className = 'chip-container';

        myWallet.forEach(card => {
          const chip = document.createElement('div');
          chip.className = 'mini-chip';
          const isLinked = (payMap[pay] || []).includes(card.name);
          if (isLinked) chip.classList.add('selected');
          chip.innerText = card.name;
          chip.onclick = () => {
            if (!payMap[pay]) payMap[pay] = [];
            const cIdx = payMap[pay].indexOf(card.name);
            if (cIdx > -1) payMap[pay].splice(cIdx, 1);
            else payMap[pay].push(card.name);
            renderPaymentSetup();
            updateHomeStats();
          };
          chipContainer.appendChild(chip);
        });
        div.appendChild(chipContainer);
        container.appendChild(div);
      });
    }

    function updateHomeStats() {
      document.getElementById('count-cards').innerText = myWallet.length;
      const linkedPayCount = Object.keys(payMap).filter(k => payMap[k].length > 0).length;
      document.getElementById('count-pay').innerText = linkedPayCount;

      const summary = document.getElementById('wallet-summary');
      if (myWallet.length > 0) {
        summary.innerHTML = myWallet.map(c => c.name).join('、');
        summary.style.opacity = '0.8';
      }
    }

    async function saveAll() {
      const btn = document.getElementById('save-btn');
      btn.disabled = true;
      btn.innerText = "同步中...";

      try {
        const idToken = liff.getIDToken();
        const res = await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            action: "save_settings",
            idToken,
            myWallet,
            payMap
          })
        });
        const responseText = await res.text();
        console.log("Raw GAS Response:", responseText);

        let result;
        try {
          result = JSON.parse(responseText);
        } catch (e) {
          throw new Error("伺服器回應格式錯誤 (非 JSON)。回應內容：" + responseText.substring(0, 100));
        }

        if (result.success) {
          alert("✅ 設定已成功同步至雲端！");
          liff.closeWindow();
        } else {
          throw new Error(result.msg || "伺服器未提供錯誤說明 (msg 為空)");
        }
      } catch (err) {
        console.error("Sync Error Detailed:", err);
        alert("儲存失敗：" + err.message);
        btn.disabled = false;
        btn.innerText = "儲存所有設定並同步";
      }
    }
  </script>
</body>

</html>
